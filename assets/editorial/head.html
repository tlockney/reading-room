<!-- EDITORIAL-HEAD:start -->
<style>
  /* The hint is a CSS pseudo-element, not a DOM node, so async renderers
     (Mermaid rewrites its host's innerHTML) can't wipe it. */
  .edzoom-able{cursor:zoom-in;position:relative;}
  .edzoom-able::after{
    content:"Click to zoom";
    position:absolute;top:8px;right:8px;z-index:2;
    font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9px;
    letter-spacing:0.18em;text-transform:uppercase;color:#a85a1a;
    background:rgba(243,236,221,0.85);border:1px solid #c9bfa3;
    padding:3px 7px;border-radius:2px;opacity:0;transition:opacity .15s;pointer-events:none;
  }
  .edzoom-able:hover::after{opacity:1;}
  .edzoom-overlay{
    position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;
    background:rgba(243,236,221,0.97);
    -webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);cursor:zoom-out;
  }
  .edzoom-overlay.open{display:flex;}
  .edzoom-stage{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:grab;touch-action:none;
  }
  .edzoom-stage.dragging{cursor:grabbing;}
  .edzoom-content{
    transform-origin:center center;will-change:transform;user-select:none;
    width:min(92vw,1300px);max-height:90vh;display:flex;align-items:center;justify-content:center;
  }
  .edzoom-content svg, .edzoom-content img{
    display:block;width:100% !important;height:auto !important;
    max-width:100% !important;max-height:90vh !important;
  }
  .edzoom-controls{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1001;display:flex;
    font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.12em;
    text-transform:uppercase;background:#ece4d2;border:1px solid #8a7e5e;border-radius:3px;overflow:hidden;
  }
  .edzoom-controls button{
    appearance:none;background:transparent;border:none;border-left:1px solid #c9bfa3;
    color:#a85a1a;padding:9px 15px;cursor:pointer;font:inherit;letter-spacing:inherit;text-transform:inherit;
  }
  .edzoom-controls button:first-child{border-left:none;}
  .edzoom-controls button:hover{background:#f3ecdd;color:#c87a2f;}
  .edzoom-controls .edzoom-pct{
    color:#6b6357;padding:9px 14px;border-left:1px solid #c9bfa3;min-width:64px;text-align:center;align-self:center;
  }
  @media print{.edzoom-overlay,.edzoom-controls,.edzoom-able::after{display:none !important;}}

  :root[data-theme="dark"]{
    --bg:#181410; --bg-soft:#211b15; --bg-code:#241d16;
    --ink:#ece4d2; --ink-soft:#c4b8a2; --ink-mute:#a89a82;
    --forest:#9db8ac; --forest-deep:#efe6d4;
    --copper:#d98a44; --copper-soft:#e8a766;
    --rule:#3a332a; --rule-strong:#5b5242;
  }
  :root[data-theme="dark"] body{background-image:none;}
  :root[data-theme="dark"] pre{background:#0f0c09;}
  :root[data-theme="dark"] [data-library-nav]{background:#181410 !important;border-bottom-color:#3a332a !important;}
  :root[data-theme="dark"] .edzoom-overlay{background:rgba(18,15,11,0.97) !important;}
  :root[data-theme="dark"] .edzoom-controls{background:#211b15;border-color:#5b5242;}
  :root[data-theme="dark"] .edzoom-controls button{border-left-color:#3a332a;}
  :root[data-theme="dark"] .edzoom-able::after{background:#0f0c09;border-color:#6b5d44;color:#f2b66e;font-weight:600;}
  :root[data-theme="dark"] figure svg,
  :root[data-theme="dark"] .mermaid svg,
  :root[data-theme="dark"] figure img,
  :root[data-theme="dark"] .edzoom-content svg,
  :root[data-theme="dark"] .edzoom-content img{
    background:#f3ecdd;border:1px solid #c9bfa3;border-radius:6px;
    padding:14px;box-sizing:border-box;
  }
  .edtheme{
    position:fixed;bottom:18px;right:18px;z-index:1100;
    font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--copper);background:var(--bg-soft);
    border:1px solid var(--rule-strong);border-radius:2px;padding:6px 11px;cursor:pointer;
  }
  .edtheme:hover{color:var(--copper-soft);border-color:var(--copper);}
  @media print{.edtheme{display:none;}}
  :root.edzoom-open .edtheme{display:none !important;}
  :root[data-ed-theme="off"] .edtheme{display:none !important;}
  @media(max-width:720px){
    pre{overflow-x:auto;}
    code{overflow-wrap:anywhere;}
    table{display:block;overflow-x:auto;max-width:100%;}
  }
</style>
<script>
(function(){
  if(document.documentElement.getAttribute('data-ed-theme')==='off'){
    document.documentElement.setAttribute('data-theme','light');
    return;
  }
  var KEY='editorial-theme',s=null;
  try{s=localStorage.getItem(KEY);}catch(_){}
  var t=s||((window.matchMedia&&matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light');
  document.documentElement.setAttribute('data-theme',t);
})();
</script>
<!-- EDITORIAL-HEAD:end -->
